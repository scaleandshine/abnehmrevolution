function track(event, params) {
  try {
    var raw = localStorage.getItem('ms_stats_v1') || '{}';
    var st = JSON.parse(raw);
    st[event] = (st[event] || 0) + 1;
    localStorage.setItem('ms_stats_v1', JSON.stringify(st));
  } catch(e) {}
}
function getStats() {
  try { return JSON.parse(localStorage.getItem('ms_stats_v1') || '{}'); } catch(e) { return {}; }

function saveState() {
  try {
    localStorage.setItem('ms_eater_v1', JSON.stringify({
      screen: state.screen, qIndex: state.qIndex, answers: state.answers,
      reflections: state.reflections, email: state.email, leadSubmitted: state.leadSubmitted
    }));
  } catch(e) {}
}
function loadState() {
  try {
    var raw = localStorage.getItem('ms_eater_v1');
    if (!raw) return;
    var s = JSON.parse(raw);
    if (s.screen) state.screen = s.screen;
    if (typeof s.qIndex === 'number') state.qIndex = s.qIndex;

}
function getScore() {
  return state.answers.reduce(function(a,b){ return a + (b||0); }, 0);
}
function getResult() {
  var sc = getScore();
  for (var i=0; i<RESULTS.length; i++) {
    if (sc >= RESULTS[i].min && sc <= RESULTS[i].max) return i;

  return 0;
}

  var tagNames = ['selbsttest-emotionaler-esser', TAG_MAP[resultName] || 'selbsttest-sonstige'];
  fetch(BASE + '/subscribers', {
    method: 'POST', headers: H,
    body: JSON.stringify({
      email_address: email,
      fields: { ergebnis_typ: resultName, punkte: String(score), quelle: 'selbsttest-emotionaler-esser' }
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var subId = data.subscriber && data.subscriber.id;
    if (!subId) return;
    return Promise.all(tagNames.map(function(name) {
      return fetch(BASE + '/tags', { method: 'POST', headers: H, body: JSON.stringify({ name: name }) })
        .then(function(r) { return r.json(); })
        .then(function(d) {
          var tid = d.tag && d.tag.id;
          if (!tid) return;
          return fetch(BASE + '/tags/' + tid + '/subscribers', {
            method: 'POST', headers: H,
            body: JSON.stringify({ subscriber_id: subId })
          });
        });
    }));
  })
  .catch(function(e) { console.warn('[KIT]', e); });
}

function sendEmails(email, ri, score, reflections) {
  if (typeof emailjs === 'undefined') return;
  if (CONFIG.emailjs.publicKey === 'YOUR_PUBLIC_KEY') {
    console.info('[EmailJS] CONFIG nicht ausgefüllt – E-Mail-Versand übersprungen.');
    return;
  }
  var r = RESULTS[ri];
  var ts = new Date().toLocaleString('de-AT', { timeZone:'Europe/Vienna' });
  var refl = reflections || ['','',''];
  var notifyText = 'Neue Conversion im Emotionaler-Esser-Test!\n\nZeitpunkt: '+ts+'\nE-Mail: '+email+'\nErgebnis: '+r.name+'\nPunktzahl: '+score+'/60\nBereich: '+r.range+'\n\nReflexionen:\n1. '+(refl[0]||'(leer)')+'\n2. '+(refl[1]||'(leer)')+'\n3. '+(refl[2]||'(leer)');
  emailjs.send(CONFIG.emailjs.serviceId, CONFIG.emailjs.notifyTpl, {
    to_email: CONFIG.notifyTo, result_name: r.name, score: String(score),
    result_range: r.range, user_email: email,
    refl_1: refl[0]||'(leer)', refl_2: refl[1]||'(leer)', refl_3: refl[2]||'(leer)',
    message: notifyText
  }).catch(function(e){ console.warn('[EmailJS] Notify failed:', e); });
  emailjs.send(CONFIG.emailjs.serviceId, CONFIG.emailjs.resultTpl, {
    to_email: email, result_name: r.name, score: String(score),
    message: buildResultEmail(ri, score, reflections)
  }).catch(function(e){ console.warn('[EmailJS] Result email failed:', e); });
}

var fading = false;
function render(instant) {
  var main = document.getElementById('main');
  var screens = { hero:screenHero, quiz:screenQuiz, capture:screenCapture, result:screenResult, cta:screenCta };
  var html = (screens[state.screen] || screenHero)();
  if (instant) {
    main.innerHTML = html;
    attachListeners();
    return;
  }
  fading = true;
  main.style.opacity = '0';
  setTimeout(function() {
    main.innerHTML = html;
    attachListeners();
    main.offsetHeight; // force reflow before fade-in
    main.style.opacity = '1';
    try { window.scrollTo({ top:0, behavior:'instant' }); } catch(e) {}
    fading = false;
  }, 270);
}

function attachListeners() {
  // Email input live sync
  var emailEl = document.getElementById('email-input');
  if (emailEl) {
    emailEl.addEventListener('input', function(){ state.email = this.value; state.emailErr = ''; });
    emailEl.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); doSubmitLead(); } });
  }
  // Reflection textareas
  document.querySelectorAll('[data-refl]').forEach(function(ta) {
    ta.addEventListener('input', function() {
      var i = parseInt(this.dataset.refl);
      var r = state.reflections.slice();
      r[i] = this.value;
      state.reflections = r;
      saveState();
    });
    ta.addEventListener('focus', function() { this.style.borderColor = 'var(--ms-sage)'; });
    ta.addEventListener('blur',  function() { this.style.borderColor = 'rgba(71,97,96,0.22)'; });
  });
  // answer button hover
  document.querySelectorAll('.ans-btn').forEach(function(b) {
    b.addEventListener('mouseenter', function(){ this.style.transform = 'translateY(-2px)'; });
    b.addEventListener('mouseleave', function(){ this.style.transform = ''; });
  });
  // nav button hover
  document.querySelectorAll('.nav-btn').forEach(function(b) {
    b.addEventListener('mouseenter', function(){ this.style.background = 'rgba(239,231,221,0.18)'; });
    b.addEventListener('mouseleave', function(){ this.style.background = 'rgba(239,231,221,0.07)'; });
  });
}

// ═══════════════════════════════════════════════════════════
// Actions
// ═══════════════════════════════════════════════════════════
function fadeTo(newScreen, patch) {
  if (fading) return;
  if (patch) Object.assign(state, patch);
  state.screen = newScreen;
  saveState();
  render(false);
}

function doStart() {
  track('quiz_started');
  fadeTo('quiz', { qIndex:0 });
}
function doBack() {
  if (fading) return;
  if (state.qIndex > 0) fadeTo('quiz', { qIndex: state.qIndex - 1 });
  else fadeTo('hero');
}
var answerTimer = null;
function doAnswer(v) {
  if (fading) return;
  var answers = state.answers.slice();
  answers[state.qIndex] = v;
  state.answers = answers;
  saveState();
  render(true); // instant update to show selected highlight
  if (answerTimer) clearTimeout(answerTimer);
  answerTimer = setTimeout(function() {
    if (state.qIndex < 14) fadeTo('quiz', { qIndex: state.qIndex + 1 });
    else if (state.leadSubmitted) fadeTo('result');
    else fadeTo('capture');
  }, 430);
}
function doSubmitLead() {
  var email = (state.email || '').trim();
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email)) {
    state.emailErr = 'Bitte gib eine gültige E-Mail-Adresse ein.';
    render(true);
    return;
  }
  var ri = getResult();
  var sc = getScore();
  track('email_submitted', { result_name: RESULTS[ri].name });
  sendEmails(email, ri, sc, state.reflections);
  kitSubscribe(email, RESULTS[ri].name, sc);
  state.email = email;
  state.leadSubmitted = true;
  state.emailErr = '';
  fadeTo('result');
}
function doRestart() {
  state.answers = new Array(15).fill(null);
  state.reflections = ['','',''];
  state.email = ''; state.emailErr = '';
  state.leadSubmitted = false; state.qIndex = 0;
  fadeTo('hero');
}

// ═══════════════════════════════════════════════════════════
// Event delegation
// ═══════════════════════════════════════════════════════════
document.getElementById('main').addEventListener('click', function(e) {
  var el = e.target.closest('[data-action]');
  if (!el) return;
  var action = el.dataset.action;
  var val = el.dataset.val;
  switch(action) {
    case 'start':         doStart(); break;
    case 'back':          doBack(); break;
    case 'answer':        doAnswer(parseInt(val)); break;
    case 'submit-lead':   doSubmitLead(); break;
    case 'to-cta':        fadeTo('cta'); break;
    case 'back-cta':      fadeTo('result'); break;
    case 'restart':       doRestart(); break;
    case 'back-capture':  fadeTo('quiz', { qIndex:14 }); break;
    case 'carousel-prev': state.carouselIdx=(state.carouselIdx+3)%4; render(true); break;
    case 'carousel-next': state.carouselIdx=(state.carouselIdx+1)%4; render(true); break;
    case 'carousel-dot':  state.carouselIdx=parseInt(val); render(true); break;
    case 'workshop-click':track('workshop_click'); break;
  }
});

// ═══════════════════════════════════════════════════════════
// Admin panel (?admin in URL)
// ═══════════════════════════════════════════════════════════
function renderAdmin() {
  var st = getStats();
  var visits = st.page_view    || 0;
  var starts  = st.quiz_started || 0;
  var convs   = st.email_submitted || 0;
  var rate    = starts > 0 ? Math.round((convs/starts)*100) : 0;
  function tile(lbl, val, sub) {
    return '<div style="background:var(--ms-white);border-radius:14px;padding:16px 18px;flex:1;min-width:120px;">'
      +'<p style="margin:0 0 4px;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--ms-muted);">'+lbl+'</p>'
      +'<p style="margin:0 0 2px;font-family:var(--fd);font-size:32px;font-weight:700;color:var(--ms-sage);line-height:1;">'+val+'</p>'
      +'<p style="margin:0;font-size:11px;color:var(--ms-muted);">'+sub+'</p></div>';
  }
  var panel = document.getElementById('admin-panel');
  panel.style.display = 'block';
  panel.innerHTML = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">'
    +'<span style="font-size:12px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--ms-sage);">📊 Funnel-Statistiken</span>'
    +'<span style="font-size:11px;color:var(--ms-muted);">dieses Gerät</span></div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">'
    +tile('Besuche',  visits,  'Seitenaufrufe')
    +tile('Starts',   starts,  'Quiz gestartet')
    +tile('Leads',    convs,   'E-Mails gesammelt')
    +tile('Rate',     rate+'%','von Quiz-Starts')
    +'</div>'
    +'<button onclick="localStorage.removeItem(\'ms_stats_v1\');document.getElementById(\'admin-panel\').innerHTML=\'<p style=padding:8px;font-size:13px>Statistiken gelöscht.</p>\';" style="background:none;border:1px solid rgba(71,97,96,0.22);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:12px;color:var(--ms-muted);">Statistiken löschen</button>'
    +'<p style="margin:10px 0 0;font-size:11px;color:var(--ms-muted);line-height:1.5;">Zählt nur dieses Gerät / diesen Browser.</p>';
}

// ═══════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════
if (typeof emailjs !== 'undefined' && CONFIG.emailjs.publicKey !== 'YOUR_PUBLIC_KEY') {
  emailjs.init({ publicKey: CONFIG.emailjs.publicKey });
}
loadState();
render(true);

// Track page view once per session
if (!sessionStorage.getItem('ms_pv')) {
  sessionStorage.setItem('ms_pv', '1');
  track('page_view');
}

// Show admin panel if ?admin in URL
if (window.location.search.indexOf('admin') !== -1) {
  renderAdmin();
}
</script>
